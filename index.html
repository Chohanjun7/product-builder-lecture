<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>인공지능 동물상 테스트</h1>
            <p class="subtitle">나와 닮은 동물은 강아지? 고양이?</p>
        </header>

        <main>
            <div class="upload-container" id="upload-container">
                <input type="file" id="image-input" accept="image/*" hidden>
                <div class="upload-box" id="upload-box">
                    <div class="upload-icon">📸</div>
                    <p>사진을 업로드하거나 드래그하세요</p>
                    <span>(사진은 어디에도 저장되지 않습니다)</span>
                </div>
                <div class="image-preview-container" id="preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Preview">
                    <button id="remove-btn">다시 하기</button>
                </div>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>인공지능이 분석 중입니다...</p>
            </div>

            <div id="result-container" class="result-container" style="display: none;">
                <h2 id="result-message">분석 결과</h2>
                <div class="result-charts" id="label-container">
                    <!-- Results will be injected here -->
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 Animal Lookalike Test. Powered by Teachable Machine.</p>
        </footer>
    </div>

    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
