
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>2
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">☀️ Light Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <div id="lotto-numbers" class="lotto-numbers"></div>
        <button id="generate-btn">Generate Numbers</button>

        <section class="contact-section">
            <hr>
            <h3>제휴 문의</h3>
            <p>로또 번호 생성 서비스 제휴 및 문의사항을 남겨주세요.</p>
            <form action="https://formspree.io/f/mjgavzjw" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" rows="4" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
