<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Service: Lotto & Animal Test</title>
    <meta name="google-adsense-account" content="ca-pub-2441791970387588">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2441791970387588" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

<body>
    <div class="theme-toggle-container">
        <button id="theme-btn">☀️ Light Mode</button>
        <button id="nav-btn" class="nav-btn">🐶 동물상 테스트로 가기</button>
    </div>

    <!-- Lotto Section -->
    <div id="lotto-view" class="container">
        <h1>Lotto Number Generator</h1>
        <div id="lotto-numbers" class="lotto-numbers"></div>
        <button id="generate-btn">Generate Numbers</button>

        <section class="contact-section">
            <hr>
            <h3>제휴 문의</h3>
            <p>로또 번호 생성 서비스 제휴 및 문의사항을 남겨주세요.</p>
            <form action="https://formspree.io/f/mjgavzjw" method="POST">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" rows="4" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>

        <section class="comments-section">
            <hr>
            <div id="disqus_thread"></div>
        </section>
    </div>

    <!-- Animal Test Section (Hidden by default) -->
    <div id="animal-view" class="container" style="display: none;">
        <header>
            <h1>인공지능 동물상 테스트</h1>
            <p class="subtitle">나와 닮은 동물은 강아지? 고양이?</p>
        </header>

        <main>
            <div class="upload-container" id="upload-container">
                <input type="file" id="image-input" accept="image/*" hidden>
                <div class="upload-box" id="upload-box">
                    <div class="upload-icon">📸</div>
                    <p>사진을 업로드하거나 드래그하세요</p>
                    <span>(사진은 어디에도 저장되지 않습니다)</span>
                </div>
                <div class="image-preview-container" id="preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Preview">
                    <button id="remove-btn">다시 하기</button>
                </div>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>인공지능이 분석 중입니다...</p>
            </div>

            <div id="result-container" class="result-container" style="display: none;">
                <h2 id="result-message">분석 결과</h2>
                <div class="result-charts" id="label-container"></div>
            </div>
        </main>
        <button id="back-to-lotto" class="back-btn">← 로또 생성기로 돌아가기</button>
    </div>

    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="module" src="main.js"></script>

    <script>
        // Disqus implementation (kept as requested)

        var d = document, s = d.createElement('script');

        (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
